name: Snyk CSV Delta
on:
  push:
    branches: [ "csv-delta-help" ]
  workflow_dispatch:
env:
  BRANCH: ${{ github.head_ref || github.ref_name }}
  BRANCH_SAFE: ${{ github.head_ref || github.ref_name }}
jobs:
  Snyk-SAST-CSV-Delta:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      # Sanitize branch name for file naming
      - name: Sanitize branch name
        run: |
          BRANCH_SAFE=$(echo "${{ env.BRANCH }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "BRANCH_SAFE=$BRANCH_SAFE" >> $GITHUB_ENV
      # LOCAL: Only clears auth for current repo
      - name: Clear local auth
        run: git config --local --unset-all http.https://github.com/.extraheader || true
      - uses: actions/setup-node@v6
      - name: install snyk
        run: npm install -g snyk
      - name: Configure environment
        run: snyk config environment SNYK-GOV-01
      - name: Authenticate with Snyk SaaS
        run: snyk auth --org="${{ secrets.SNYK_ORG_ID }}" --client-id="${{ secrets.SNYK_CLIENT_ID }}" --client-secret="${{ secrets.SNYK_CLIENT_SECRET }}"
      - name: Scan this branch
        continue-on-error: true
        run: snyk code test --org="${{ secrets.SNYK_ORG_ID }}" --sarif-file-output="$RUNNER_TEMP"/"${{ env.BRANCH_SAFE }}".sarif
      - name: Filter out ignored issues
        run: python sarif_filter.py "$RUNNER_TEMP"/"${{ env.BRANCH_SAFE }}".sarif "$RUNNER_TEMP"/"${{ env.BRANCH_SAFE }}".sarif
      - name: Checkout the main branch
        if: always()
        uses: actions/checkout@v6
        with:
          ref: main
      - name: Scan the main branch
        if: always()
        continue-on-error: true
        run: snyk code test --org="${{ secrets.SNYK_ORG_ID }}" --sarif-file-output="$RUNNER_TEMP"/main.sarif
      - name: Filter out ignored issues (main)
        run: python sarif_filter.py "$RUNNER_TEMP"/main.sarif "$RUNNER_TEMP"/main.sarif
      - name: Install sarif-tools
        if: always()
        run: python -m pip install sarif-tools
      - name: Create a CSV for the branch scan
        if: always()
        run: python -m sarif csv "$RUNNER_TEMP"/"${{ env.BRANCH_SAFE }}".sarif -o "$RUNNER_TEMP"/"${{ env.BRANCH_SAFE }}".csv
      - name: Create a CSV for the main scan
        if: always()
        run: python -m sarif csv "$RUNNER_TEMP"/main.sarif -o "$RUNNER_TEMP"/main.csv
      - name: Sort the branch CSV
        run: tail -n +2 "${RUNNER_TEMP}/${{ env.BRANCH_SAFE }}.csv" | sort > "${RUNNER_TEMP}/${{ env.BRANCH_SAFE }}_sorted.csv"
      - name: Sort the main CSV
        run: tail -n +2 "${RUNNER_TEMP}/main.csv" | sort > "${RUNNER_TEMP}/main_sorted.csv"
      - name: Diff
        run: diff "${RUNNER_TEMP}/${{ env.BRANCH_SAFE }}_sorted.csv" "${RUNNER_TEMP}/main_sorted.csv" | tee "${{ env.BRANCH_SAFE }}_to_main_csv_delta.txt" || true
      - name: Issues in branch that are not in main
        run: comm -23 "${RUNNER_TEMP}/${{ env.BRANCH_SAFE }}_sorted.csv" "${RUNNER_TEMP}/main_sorted.csv" | tee "${{ env.BRANCH_SAFE }}_to_main_new_issues.csv"
      - name: Ensure delta file has content
        run: |
          if [ ! -s "${{ env.BRANCH_SAFE }}_to_main_csv_delta.txt" ]; then
            echo "No errors found!" > "${{ env.BRANCH_SAFE }}_to_main_csv_delta.txt"
          fi
      - name: Ensure new issues file has content
        run: |
          if [ ! -s "${{ env.BRANCH_SAFE }}_to_main_new_issues.csv" ]; then
            echo "No errors found!" > "${{ env.BRANCH_SAFE }}_to_main_new_issues.csv"
          fi
      - run: ls -alth
      - name: Upload the delta
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "${{ env.BRANCH_SAFE }}_to_main_csv_delta"
          path: "${{ env.BRANCH_SAFE }}_to_main_csv_delta.txt"
      - name: Upload New Issues
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "${{ env.BRANCH_SAFE }}_to_main_new_issues"
          path: "${{ env.BRANCH_SAFE }}_to_main_new_issues.csv"